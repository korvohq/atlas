# Docker Compose for Atlas local development with IPFS
#
# Usage:
#   docker compose up -d      # Start IPFS node
#   docker compose down        # Stop IPFS node
#
# Then set in your environment:
#   ATLAS_STORAGE_PROVIDER=ipfs
#   ATLAS_IPFS_API_URL=http://localhost:5001
#   ATLAS_IPFS_GATEWAY_URL=http://localhost:8080
#
# Verify it's running:
#   curl -X POST http://localhost:5001/api/v0/id

services:
  ipfs:
    image: ipfs/kubo:latest
    container_name: atlas-ipfs
    ports:
      - "4001:4001"    # P2P swarm
      - "5001:5001"    # RPC API
      - "8080:8080"    # HTTP Gateway
    volumes:
      - ipfs-data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

volumes:
  ipfs-data:

